<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить запись - Lash Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="text-center mb-4">Добавить новую запись</h2>

            <form th:action="@{/add-appointment}" th:object="${appointment}" method="post">

                <!-- Выбор клиентки -->
                <div class="mb-3">
                    <label for="client" class="form-label">Клиентка</label>
                    <select class="form-select" id="client" name="clientId" required>
                        <option value="">Выберите клиентку</option>
                        <option th:each="client : ${clients}"
                                th:value="${client.id}"
                                th:text="${client.firstName + ' ' + client.lastName}">
                        </option>
                    </select>
                </div>

                <!-- Дата и время записи -->
                <div class="mb-3">
                    <label for="appointmentDate" class="form-label">Дата и время записи</label>
                    <input type="datetime-local" class="form-control" id="appointmentDate"
                           th:field="*{appointmentDate}" required>
                </div>

                <!-- Параметры для клиента (определяют цену) -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="clientVolume" class="form-label">Объем (для клиента)</label>
                        <select class="form-select" id="clientVolume" th:field="*{clientVolume}">
                            <option value="1D">1D Классика</option>
                            <option value="2D">2D Полуобъем</option>
                            <option value="3D">3D Объем</option>
                            <option value="4D">4D Мегаобъем</option>
                            <option value="5D">5D Гиперобъем</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="clientEffect" class="form-label">Эффект (для клиента)</label>
                        <select class="form-select" id="clientEffect" th:field="*{clientEffect}">
                            <option value="natural">Натуральный</option>
                            <option value="fox">Лисье оформление</option>
                            <option value="squirrel">Беличье оформление</option>
                            <option value="doll">Кукольный эффект</option>
                        </select>
                    </div>
                </div>

                <!-- Технические параметры для мастера -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="masterCurl" class="form-label">Изгиб (для мастера)</label>
                        <select class="form-select" id="masterCurl" th:field="*{masterCurl}">
                            <option value="C">C</option>
                            <option value="CC">CC</option>
                            <option value="D">D</option>
                            <option value="L">L</option>
                            <option value="L+">L+</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="masterLength" class="form-label">Длина (для мастера)</label>
                        <select class="form-select" id="masterLength" th:field="*{masterLength}">
                            <option value="8">8 мм</option>
                            <option value="9">9 мм</option>
                            <option value="10">10 мм</option>
                            <option value="11">11 мм</option>
                            <option value="12">12 мм</option>
                            <option value="13">13 мм</option>
                            <option value="14">14 мм</option>
                        </select>
                    </div>
                </div>

                <!-- Заметки мастера -->
                <div class="mb-3">
                    <label for="masterNotes" class="form-label">Заметки мастера</label>
                    <textarea class="form-control" id="masterNotes" th:field="*{masterNotes}"
                              rows="3" placeholder="Особенности, аллергии, пожелания..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Добавить запись</button>
                    <a href="/appointments" class="btn btn-secondary">Назад к записям</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
