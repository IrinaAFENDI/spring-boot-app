<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Lash Manager</h1>

    <a th:href="@{/add-client}" class="btn btn-primary">+ Добавить клиентку</a>
     <a th:href="@{/appointments}" class="btn btn-success">  Смотреть записи</a>
    <h2 class="mt-4">Список клиенток:</h2>

    <div th:each="client : ${clients}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h5 class="card-title" th:text="${client.firstName} + ' ' + ${client.lastName}"></h5>
                    <p class="card-text mb-1"><strong>Телефон:</strong> <span th:text="${client.phoneNumber}"></span></p>
                    <p class="card-text"><strong>Заметки:</strong> <span th:text="${client.notes}"></span></p>
                </div>
                <form th:action="@{/delete-client/{id}(id=${client.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">🗑️ Удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
